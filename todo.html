<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>📝 My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>

            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button class="add-btn" onclick="addTodo()">Add Task</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" onclick="filterTodos('all')">All</button>
                <button class="filter-btn" onclick="filterTodos('active')">Active</button>
                <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
            </div>

            <div class="stats">
                <span class="stat-item">
                    <strong id="totalCount">0</strong> Total
                </span>
                <span class="stat-item">
                    <strong id="activeCount">0</strong> Active
                </span>
                <span class="stat-item">
                    <strong id="completedCount">0</strong> Completed
                </span>
            </div>

            <ul class="todo-list" id="todoList">
                <!-- Todos will be added here -->
            </ul>

            <div class="empty-state" id="emptyState">
                <p>✨ No tasks yet. Add one to get started!</p>
            </div>

            <div class="action-section">
                <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
                <button class="clear-all-btn" onclick="clearAll()">Clear All</button>
            </div>
        </div>
    </div>

    <script src="todo.js"></script>
</body>
</html>
